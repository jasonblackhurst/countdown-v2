<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Test Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
  h1 { font-size: 24px; margin-bottom: 8px; color: #f0f6fc; }
  .subtitle { color: #8b949e; margin-bottom: 24px; }
  .approve-box { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
  .approve-box code { background: #21262d; padding: 4px 8px; border-radius: 4px; font-size: 14px; color: #f78166; cursor: pointer; }
  .approve-box code:hover { background: #30363d; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 16px; overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
  .card-title { font-weight: 600; color: #f0f6fc; }
  .tabs { display: flex; gap: 0; }
  .tab { padding: 6px 12px; cursor: pointer; border: 1px solid #30363d; background: #0d1117; color: #8b949e; font-size: 13px; }
  .tab:first-child { border-radius: 4px 0 0 4px; }
  .tab:last-child { border-radius: 0 4px 4px 0; }
  .tab.active { background: #21262d; color: #c9d1d9; border-color: #58a6ff; }
  .card-body { padding: 16px; display: flex; justify-content: center; }
  .card-body img { max-width: 100%; height: auto; border: 1px solid #30363d; border-radius: 4px; }
  .slider-container { position: relative; width: 100%; max-width: 800px; overflow: hidden; }
  .slider-container img { display: block; width: 100%; }
  .slider-overlay { position: absolute; top: 0; left: 0; height: 100%; overflow: hidden; border-right: 2px solid #f78166; }
  .slider-overlay img { display: block; height: 100%; }
  .slider-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: col-resize; z-index: 10; }
  .label { position: absolute; top: 8px; padding: 2px 8px; background: rgba(0,0,0,0.7); border-radius: 4px; font-size: 12px; z-index: 5; }
  .label-left { left: 8px; color: #f78166; }
  .label-right { right: 8px; color: #58a6ff; }
  .no-failures { text-align: center; padding: 48px; color: #3fb950; font-size: 18px; }
</style>
</head>
<body>
<h1>Golden Test Review</h1>
<p class="subtitle">Visual regression comparison for pull request</p>
<div class="approve-box">
  <span>To approve these changes, comment on the PR:</span>
  <code id="approve-cmd" onclick="copyApprove()">/approve-goldens</code>
  <span id="copy-feedback" style="color: #3fb950; display: none;">Copied!</span>
</div>
<div id="cards"></div>

<script src="config.js"></script>
<script>
function copyApprove() {
  navigator.clipboard.writeText('/approve-goldens');
  const fb = document.getElementById('copy-feedback');
  fb.style.display = 'inline';
  setTimeout(() => fb.style.display = 'none', 2000);
}

function formatName(raw) {
  return raw
    .replace(/goldens_/g, '')
    .replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function createSlider(testSrc, masterSrc) {
  const container = document.createElement('div');
  container.className = 'slider-container';

  container.innerHTML = `
    <img src="${testSrc}" alt="Test image" style="width:100%">
    <div class="slider-overlay" style="width:50%">
      <img src="${masterSrc}" alt="Master image">
    </div>
    <input type="range" class="slider-input" min="0" max="100" value="50">
    <span class="label label-left">Master</span>
    <span class="label label-right">Test</span>
  `;

  const overlay = container.querySelector('.slider-overlay');
  const overlayImg = overlay.querySelector('img');
  const input = container.querySelector('.slider-input');

  input.addEventListener('input', (e) => {
    const pct = e.target.value + '%';
    overlay.style.width = pct;
  });

  // Match overlay image width to container
  const observer = new ResizeObserver(() => {
    overlayImg.style.width = container.offsetWidth + 'px';
  });
  observer.observe(container);

  return container;
}

function render() {
  const root = document.getElementById('cards');

  if (!window.GOLDEN_CONFIG || !GOLDEN_CONFIG.images || GOLDEN_CONFIG.images.length === 0) {
    root.innerHTML = '<div class="no-failures">No golden test failures found.</div>';
    return;
  }

  GOLDEN_CONFIG.images.forEach((img, idx) => {
    const card = document.createElement('div');
    card.className = 'card';

    const views = [
      { id: 'compare', label: 'Compare' },
      { id: 'test', label: 'Test' },
      { id: 'master', label: 'Master' },
      { id: 'diff', label: 'Diff' },
    ];

    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">${formatName(img.name)}</span>
        <div class="tabs">
          ${views.map((v, i) =>
            `<div class="tab ${i === 0 ? 'active' : ''}" data-view="${v.id}" data-card="${idx}">${v.label}</div>`
          ).join('')}
        </div>
      </div>
      <div class="card-body" id="card-body-${idx}"></div>
    `;

    root.appendChild(card);

    // Show compare view by default
    const body = card.querySelector(`#card-body-${idx}`);
    body.appendChild(createSlider(img.testImage, img.masterImage));

    // Tab switching
    card.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        card.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        body.innerHTML = '';

        switch (tab.dataset.view) {
          case 'compare':
            body.appendChild(createSlider(img.testImage, img.masterImage));
            break;
          case 'test':
            body.innerHTML = `<img src="${img.testImage}" alt="Test">`;
            break;
          case 'master':
            body.innerHTML = `<img src="${img.masterImage}" alt="Master">`;
            break;
          case 'diff':
            body.innerHTML = `<img src="${img.maskedDiff}" alt="Diff">`;
            break;
        }
      });
    });
  });
}

render();
</script>
</body>
</html>
