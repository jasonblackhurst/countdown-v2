name: Update Goldens

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update goldens on (default: current branch)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: apps/countdown_flutter

      - name: Update golden files
        run: flutter test --update-goldens
        working-directory: apps/countdown_flutter

      - name: Check for changes
        id: changes
        run: |
          git add apps/countdown_flutter/test/golden/screens/goldens/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No golden file changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Golden file changes detected"
          fi

      - name: Commit updated goldens
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -m "Update golden files [skip ci]"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "Golden files updated and pushed."
          else
            echo "No golden file changes needed."
          fi
